<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    
    <title>Soome Keele Treener | Käändelõppude Harjutamine | Perekond Ojaküla</title>
    <meta name="description" content="Õpi soome keele kohakäändeid (inessiiv, elatiiv, illatiiv) mänguliselt ja tasuta.">
    <meta name="author" content="Perekond Ojaküla">
    <meta name="theme-color" content="#FFF8F0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-cream: #FFF8F0;
            --bg-white: #FFFFFF;
            --text-dark: #3A3A3A;
            --text-light: #6B6B6B;
            --accent-lavender: #B8A9D6;
            --btn-primary: #E8D5C4;
            --btn-hover: #D4C4B3;
            --success-green: #D4E6C4;
            --error-red: #F0C4C4;
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
            --border-radius-sm: 12px;
            --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.04);
            --font-heading: 'Quicksand', sans-serif;
            --font-body: 'Inter', sans-serif;
        }
        
        body {
            font-family: var(--font-body);
            background-color: var(--bg-cream);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.5;
        }
        
        .app-container {
            background: var(--bg-white);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-soft);
            padding: 32px 28px;
            max-width: 650px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px dashed rgba(184, 169, 214, 0.2);
        }
        
        .maskott {
            font-size: 48px;
            line-height: 1;
            cursor: pointer;
        }
        
        .header-text h1 {
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 28px;
            color: var(--text-dark);
        }
        
        .header-text p {
            color: var(--text-light);
            font-size: 14px;
        }
        
        .progress-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            background: rgba(232, 213, 196, 0.15);
            padding: 12px 18px;
            border-radius: var(--border-radius-md);
        }
        
        .seeria {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 18px;
        }
        
        .mustikad {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .mustikas {
            font-size: 22px;
            opacity: 0.3;
            transition: opacity 0.3s ease;
        }
        
        .mustikas.taidetud {
            opacity: 1;
        }
        
        .question-card {
            background: linear-gradient(135deg, rgba(255, 248, 240, 0.6) 0%, rgba(255, 255, 255, 0.9) 100%);
            border-radius: var(--border-radius-md);
            padding: 32px 24px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid rgba(232, 213, 196, 0.3);
        }
        
        .lause {
            font-family: var(--font-heading);
            font-size: 32px;
            font-weight: 500;
            color: var(--text-dark);
            line-height: 1.4;
            word-break: break-word;
        }
        
        .vihje {
            margin-top: 16px;
            font-size: 18px;
            color: var(--text-light);
            font-style: italic;
        }
        
        .vihje span {
            background: rgba(184, 169, 214, 0.15);
            padding: 4px 14px;
            border-radius: 30px;
            font-style: normal;
        }
        
        .vastus-ala {
            margin-bottom: 20px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .vastus-input {
            flex: 1;
            padding: 18px 20px;
            font-size: 20px;
            font-family: var(--font-body);
            border: 2px solid rgba(232, 213, 196, 0.4);
            border-radius: var(--border-radius-sm);
            background: white;
            color: var(--text-dark);
            outline: none;
            transition: all 0.2s ease;
            text-align: center;
        }
        
        .vastus-input:focus {
            border-color: var(--accent-lavender);
            box-shadow: 0 0 0 4px rgba(184, 169, 214, 0.15);
        }
        
        .btn {
            padding: 18px 28px;
            font-size: 18px;
            font-family: var(--font-heading);
            font-weight: 600;
            border: none;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--btn-primary);
            color: var(--text-dark);
            border: 1px solid rgba(255, 255, 255, 0.3);
            white-space: nowrap;
        }
        
        .btn:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.05);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: transparent;
            border: 2px solid var(--accent-lavender);
            color: var(--text-dark);
        }
        
        .btn-small {
            padding: 12px 18px;
            font-size: 16px;
        }
        
        .tagasiside {
            min-height: 60px;
            padding: 12px 18px;
            border-radius: var(--border-radius-sm);
            margin-bottom: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
        }
        
        .tagasiside.oige {
            background: var(--success-green);
            color: #2D4A1E;
            border-left: 6px solid #6B9E4A;
        }
        
        .tagasiside.vale {
            background: var(--error-red);
            color: #6B2E2E;
            border-left: 6px solid #C44B4B;
        }
        
        .tagasiside.info {
            background: rgba(232, 213, 196, 0.3);
            color: var(--text-light);
        }
        
        .tagasiside-tekst {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .reegeli-nupp {
            background: transparent;
            border: 1.5px solid currentColor;
            color: inherit;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.7;
        }
        
        .tools-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .raskete-nupud {
            display: flex;
            gap: 8px;
        }
        
        .btn-icon {
            padding: 12px 16px;
            font-size: 18px;
            background: white;
            border: 1.5px solid rgba(184, 169, 214, 0.3);
        }
        
        .footer {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 2px dashed rgba(184, 169, 214, 0.2);
            text-align: center;
        }
        
        .footer-autor {
            font-family: var(--font-heading);
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 6px;
        }
        
        .footer-moto {
            font-size: 14px;
            color: var(--text-light);
            font-style: italic;
            margin-bottom: 12px;
        }
        
        .footer-fakt {
            background: rgba(184, 169, 214, 0.08);
            padding: 12px 16px;
            border-radius: var(--border-radius-md);
            font-size: 14px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
        }
        
        .hidden {
            display: none !important;
        }
        
        @media (max-width: 600px) {
            .app-container {
                padding: 20px 16px;
            }
            
            .lause {
                font-size: 26px;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            .btn {
                padding: 16px 20px;
                white-space: normal;
            }
            
            .tools-row {
                flex-direction: column;
                align-items: stretch;
            }
            
            .raskete-nupud {
                justify-content: center;
            }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .maskott.roomus {
            animation: bounce 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .maskott.kurb {
            animation: shake 0.4s ease;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="header">
        <div class="maskott" id="maskott">🦊</div>
        <div class="header-text">
            <h1>Soome Keele Treener</h1>
            <p>Kohakäänded • Inessiiv • Elatiiv • Illatiiv</p>
        </div>
    </div>
    
    <div class="progress-section">
        <div class="seeria">
            <span>🔥</span>
            <span id="seeria-nr">0</span>
        </div>
        <div class="mustikad" id="mustika-korv">
            <span class="mustikas">🫐</span>
            <span class="mustikas">🫐</span>
            <span class="mustikas">🫐</span>
            <span class="mustikas">🫐</span>
            <span class="mustikas">🫐</span>
        </div>
    </div>
    
    <div class="question-card">
        <div class="lause" id="lause-kuva">Asun _____.</div>
        <div class="vihje" id="vihje-kuva">(<span id="vihje-sona">maja</span>)</div>
    </div>
    
    <div class="vastus-ala">
        <div class="input-group">
            <input type="text" class="vastus-input" id="vastus-input" placeholder="Kirjuta siia..." autocomplete="off" autofocus>
            <button class="btn" id="kontrolli-nupp">Kontrolli</button>
            <button class="btn btn-secondary" id="jargmine-nupp" style="display: none;">Järgmine →</button>
        </div>
    </div>
    
    <div class="tagasiside info" id="tagasiside-kast">
        <div class="tagasiside-tekst">
            <span id="tagasiside-ikoon">📝</span>
            <span id="tagasiside-tekst">Alustame! Kirjuta puuduv sõnavorm.</span>
        </div>
        <div class="katsed" id="katsete-luger"></div>
        <button class="reegeli-nupp hidden" id="reegeli-nupp">?</button>
    </div>
    
    <div class="tools-row">
        <div class="raskete-nupud">
            <button class="btn btn-small btn-icon" id="lipu-nupp">🏁</button>
            <button class="btn btn-small btn-icon" id="raskeid-nupp">🎯 Raskeid</button>
            <button class="btn btn-small btn-icon" id="eksport-nupp">📤</button>
            <button class="btn btn-small btn-icon" id="import-nupp">📥</button>
            <input type="file" id="import-fail" accept=".json" style="display: none;">
        </div>
        <button class="btn btn-small btn-secondary" id="uus-lause-nupp">🎲 Uus lause</button>
    </div>
    
    <div class="footer">
        <div class="footer-autor">🌿 Koostanud südamega Perekond Ojaküla</div>
        <div class="footer-moto">"Sisu on seiklus, mida mööda käia"</div>
        <div class="footer-fakt" id="fakti-kast">
            <span>🇫🇮</span>
            <span id="fakti-tekst">Soomes on igaühel õigus looduses marju korjata – ka eramaal!</span>
        </div>
    </div>
    
</div>

<script>
    // Ootame kuni leht on täielikult laetud
    window.addEventListener('DOMContentLoaded', function() {
        "use strict";
        
        // ===== ANDMED =====
        const sonad = [
            { id: 1, tyvi: "talo", tolge: "maja", vormid: { inessiiv: "talossa", elatiiv: "talosta", illatiiv: "taloon" }, raske: false },
            { id: 2, tyvi: "metsä", tolge: "mets", vormid: { inessiiv: "metsässä", elatiiv: "metsästä", illatiiv: "metsään" }, raske: false },
            { id: 3, tyvi: "kauppa", tolge: "pood", vormid: { inessiiv: "kaupassa", elatiiv: "kaupasta", illatiiv: "kauppaan" }, raske: false },
            { id: 4, tyvi: "koulu", tolge: "kool", vormid: { inessiiv: "koulussa", elatiiv: "koulusta", illatiiv: "kouluun" }, raske: false },
            { id: 5, tyvi: "puisto", tolge: "park", vormid: { inessiiv: "puistossa", elatiiv: "puistosta", illatiiv: "puistoon" }, raske: false },
            { id: 6, tyvi: "kirjasto", tolge: "raamatukogu", vormid: { inessiiv: "kirjastossa", elatiiv: "kirjastosta", illatiiv: "kirjastoon" }, raske: false },
            { id: 7, tyvi: "kahvila", tolge: "kohvik", vormid: { inessiiv: "kahvilassa", elatiiv: "kahvilasta", illatiiv: "kahvilaan" }, raske: false },
            { id: 8, tyvi: "apteekki", tolge: "apteek", vormid: { inessiiv: "apteekissa", elatiiv: "apteekista", illatiiv: "apteekkiin" }, raske: false }
        ];
        
        const laused = [
            { mall: "Asun {0}.", kaane: "inessiiv", reegel: "Väljendab asukohta millegi sees. Lisa tüvele -ssa või -ssä." },
            { mall: "Olen {0}.", kaane: "inessiiv", reegel: "Väljendab asukohta millegi sees. Lisa tüvele -ssa või -ssä." },
            { mall: "Tulen {0}.", kaane: "elatiiv", reegel: "Väljendab liikumist millegi seest välja. Lisa tüvele -sta või -stä." },
            { mall: "Lähden {0}.", kaane: "elatiiv", reegel: "Väljendab lahkumist kuskilt. Lisa tüvele -sta või -stä." },
            { mall: "Menen {0}.", kaane: "illatiiv", reegel: "Väljendab liikumist millegi sisse. Lisa tüvele -Vn (nt taloon, metsään)." },
            { mall: "Saavun {0}.", kaane: "illatiiv", reegel: "Väljendab saabumist kuhugi. Lisa tüvele -Vn." }
        ];
        
        const faktid = [
            "Soomes on igaühel õigus looduses marju korjata – ka eramaal!",
            "Soome keeles on sõna 'kalsarikännit' – kodus aluspükste väel joomine.",
            "Soomes on üle 188 000 järve.",
            "Soome keeles pole grammatilist sugu – ei 'tema' ega 'ta' vahet.",
            "Soomlased joovad maailmas kõige rohkem kohvi inimese kohta.",
            "Sõna 'sauna' on ainus soomekeelne sõna, mis on levinud üle maailma."
        ];
        
        // ===== RAKENDUSE SEISUND =====
        let hetkelLause = null;
        let hetkelSona = null;
        let hetkelKaane = null;
        let hetkelOigeVastus = "";
        let katsed = 0;
        let seeria = 0;
        let oigeidJarjest = 0;
        let harjutaRaskeidAinult = false;
        
        // ===== DOM ELEMENDID =====
        const maskottEl = document.getElementById('maskott');
        const seeriaNrEl = document.getElementById('seeria-nr');
        const mustikadEl = document.querySelectorAll('.mustikas');
        const lauseKuvaEl = document.getElementById('lause-kuva');
        const vihjeSonaEl = document.getElementById('vihje-sona');
        const vastusInput = document.getElementById('vastus-input');
        const kontrolliNupp = document.getElementById('kontrolli-nupp');
        const jargmineNupp = document.getElementById('jargmine-nupp');
        const tagasisideKast = document.getElementById('tagasiside-kast');
        const tagasisideIkoon = document.getElementById('tagasiside-ikoon');
        const tagasisideTekst = document.getElementById('tagasiside-tekst');
        const katseteLuger = document.getElementById('katsete-luger');
        const reegeliNupp = document.getElementById('reegeli-nupp');
        const lipuNupp = document.getElementById('lipu-nupp');
        const raskeidNupp = document.getElementById('raskeid-nupp');
        const uusLauseNupp = document.getElementById('uus-lause-nupp');
        const eksportNupp = document.getElementById('eksport-nupp');
        const importNupp = document.getElementById('import-nupp');
        const importFail = document.getElementById('import-fail');
        const faktiTekst = document.getElementById('fakti-tekst');
        
        // ===== FUNKTSIOONID =====
        
        function uuendaMustikaid() {
            const taitunud = Math.min(Math.floor(oigeidJarjest / 2), 5);
            mustikadEl.forEach((m, i) => {
                if (i < taitunud) {
                    m.classList.add('taidetud');
                } else {
                    m.classList.remove('taidetud');
                }
            });
        }
        
        function uuendaSeeria() {
            seeriaNrEl.textContent = seeria;
        }
        
        function resetKatsed() {
            katsed = 0;
            katseteLuger.textContent = '';
            reegeliNupp.classList.add('hidden');
        }
        
        function muudaMaskotiEmotsioon(emotsioon) {
            maskottEl.className = 'maskott ' + (emotsioon === 'roomus' ? 'roomus' : (emotsioon === 'kurb' ? 'kurb' : ''));
            setTimeout(() => {
                maskottEl.className = 'maskott';
            }, 600);
        }
        
        function valiJuhuslikLause() {
            let saadavalSonad = harjutaRaskeidAinult ? sonad.filter(s => s.raske) : sonad;
            
            if (saadavalSonad.length === 0) {
                harjutaRaskeidAinult = false;
                raskeidNupp.textContent = '🎯 Raskeid';
                saadavalSonad = sonad;
            }
            
            const juhuslikLauseIndeks = Math.floor(Math.random() * laused.length);
            const juhuslikSonaIndeks = Math.floor(Math.random() * saadavalSonad.length);
            
            hetkelLause = laused[juhuslikLauseIndeks];
            hetkelSona = saadavalSonad[juhuslikSonaIndeks];
            hetkelKaane = hetkelLause.kaane;
            
            if (!hetkelSona.vormid[hetkelKaane]) {
                return valiJuhuslikLause();
            }
            
            hetkelOigeVastus = hetkelSona.vormid[hetkelKaane];
            
            lauseKuvaEl.innerHTML = hetkelLause.mall.replace('{0}', '_____');
            vihjeSonaEl.textContent = hetkelSona.tolge;
            
            lipuNupp.style.opacity = hetkelSona.raske ? '1' : '0.5';
        }
        
        function uusLause() {
            valiJuhuslikLause();
            vastusInput.value = '';
            vastusInput.disabled = false;
            vastusInput.focus();
            kontrolliNupp.style.display = 'block';
            jargmineNupp.style.display = 'none';
            
            tagasisideKast.className = 'tagasiside info';
            tagasisideIkoon.textContent = '📝';
            tagasisideTekst.textContent = 'Kirjuta puuduv sõnavorm.';
            
            resetKatsed();
        }
        
        function kontrolliVastust() {
            let kasutajaVastus = vastusInput.value.trim().toLowerCase();
            kasutajaVastus = kasutajaVastus.replace(/[.,!?]+$/, '');
            
            const onOige = kasutajaVastus === hetkelOigeVastus.toLowerCase();
            
            if (onOige) {
                seeria++;
                oigeidJarjest++;
                uuendaSeeria();
                uuendaMustikaid();
                muudaMaskotiEmotsioon('roomus');
                
                tagasisideKast.className = 'tagasiside oige';
                tagasisideIkoon.textContent = '✅';
                tagasisideTekst.textContent = `Õige! Hästi tehtud! (${hetkelOigeVastus})`;
                
                vastusInput.disabled = true;
                kontrolliNupp.style.display = 'none';
                jargmineNupp.style.display = 'block';
                reegeliNupp.classList.add('hidden');
                katseteLuger.textContent = '';
                
            } else {
                katsed++;
                muudaMaskotiEmotsioon('kurb');
                
                tagasisideKast.className = 'tagasiside vale';
                tagasisideIkoon.textContent = '❌';
                
                if (katsed >= 3) {
                    tagasisideTekst.textContent = `Kahjuks vale. Õige vastus on: ${hetkelOigeVastus}`;
                    reegeliNupp.classList.add('hidden');
                    
                    vastusInput.disabled = true;
                    kontrolliNupp.style.display = 'none';
                    jargmineNupp.style.display = 'block';
                    
                    seeria = 0;
                    oigeidJarjest = 0;
                    uuendaSeeria();
                    uuendaMustikaid();
                    
                } else {
                    tagasisideTekst.textContent = `Vale vastus. Proovi uuesti!`;
                    katseteLuger.textContent = `${katsed}/3 katset`;
                    reegeliNupp.classList.remove('hidden');
                    vastusInput.value = '';
                    vastusInput.focus();
                }
            }
            salvestaEdusammud();
        }
        
        function naitaReeglit() {
            if (hetkelLause) {
                tagasisideTekst.textContent = `📖 ${hetkelLause.reegel}`;
                tagasisideKast.className = 'tagasiside info';
                tagasisideIkoon.textContent = '📘';
            }
        }
        
        function vahetaLipuStaatus() {
            if (hetkelSona) {
                hetkelSona.raske = !hetkelSona.raske;
                lipuNupp.style.opacity = hetkelSona.raske ? '1' : '0.5';
                salvestaEdusammud();
            }
        }
        
        function vahetaHarjutaRaskeid() {
            harjutaRaskeidAinult = !harjutaRaskeidAinult;
            raskeidNupp.textContent = harjutaRaskeidAinult ? '🎯 Kõiki' : '🎯 Raskeid';
            uusLause();
        }
        
        function salvestaEdusammud() {
            const andmed = {
                sonad: sonad.map(s => ({ id: s.id, raske: s.raske })),
                seeria: seeria,
                oigeidJarjest: oigeidJarjest
            };
            localStorage.setItem('soomeTreener', JSON.stringify(andmed));
        }
        
        function laadiEdusammud() {
            const salvestatud = localStorage.getItem('soomeTreener');
            if (salvestatud) {
                try {
                    const andmed = JSON.parse(salvestatud);
                    andmed.sonad.forEach(salvSona => {
                        const sona = sonad.find(s => s.id === salvSona.id);
                        if (sona) sona.raske = salvSona.raske;
                    });
                    seeria = andmed.seeria || 0;
                    oigeidJarjest = andmed.oigeidJarjest || 0;
                    uuendaSeeria();
                    uuendaMustikaid();
                } catch (e) {}
            }
        }
        
        function ekspordiEdusammud() {
            const andmed = {
                sonad: sonad.map(s => ({ id: s.id, tyvi: s.tyvi, raske: s.raske })),
                seeria: seeria,
                oigeidJarjest: oigeidJarjest
            };
            const blob = new Blob([JSON.stringify(andmed, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `soome_edusammud.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function impordiEdusammud(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const andmed = JSON.parse(e.target.result);
                    andmed.sonad.forEach(salvSona => {
                        const sona = sonad.find(s => s.id === salvSona.id);
                        if (sona) sona.raske = salvSona.raske;
                    });
                    seeria = andmed.seeria || 0;
                    oigeidJarjest = andmed.oigeidJarjest || 0;
                    uuendaSeeria();
                    uuendaMustikaid();
                    salvestaEdusammud();
                    if (hetkelSona) {
                        lipuNupp.style.opacity = hetkelSona.raske ? '1' : '0.5';
                    }
                } catch (e) {
                    alert('Vigane fail!');
                }
            };
            reader.readAsText(file);
            importFail.value = '';
        }
        
        // ===== SÜNDMUSTE KUULARID =====
        kontrolliNupp.addEventListener('click', kontrolliVastust);
        jargmineNupp.addEventListener('click', () => { uusLause(); salvestaEdusammud(); });
        uusLauseNupp.addEventListener('click', uusLause);
        reegeliNupp.addEventListener('click', naitaReeglit);
        lipuNupp.addEventListener('click', vahetaLipuStaatus);
        raskeidNupp.addEventListener('click', vahetaHarjutaRaskeid);
        eksportNupp.addEventListener('click', ekspordiEdusammud);
        importNupp.addEventListener('click', () => importFail.click());
        importFail.addEventListener('change', impordiEdusammud);
        
        vastusInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !vastusInput.disabled) {
                kontrolliVastust();
            }
        });
        
        maskottEl.addEventListener('click', () => {
            muudaMaskotiEmotsioon('roomus');
        });
        
        // ===== KÄIVITAMINE =====
        laadiEdusammud();
        faktiTekst.textContent = faktid[Math.floor(Math.random() * faktid.length)];
        valiJuhuslikLause();
        setInterval(salvestaEdusammud, 5000);
        
    });
</script>
