            { id: 23, tyvi: "verenpaine", tolge: "vererõhk", teema: '🏥 Tervis', raske: false, vormid: { inessiiv: "verenpaineessa", elatiiv: "verenpaineesta", illatiiv: "verenpaineeseen", partitiiv: "verenpainetta", genitiiv: "verenpaineen" } },
            { id: 24, tyvi: "apteekki", tolge: "apteek", teema: '🏥 Tervis', raske: false, vormid: { inessiiv: "apteekissa", elatiiv: "apteekista", illatiiv: "apteekkiin", partitiiv: "apteekkia", genitiiv: "apteekin" } },
            
            // Keskkond, Reisimine, Haridus, Kultuur, Suhted (lühendatud ruumi kokkuhoiuks, aga lisatud)
            { id: 25, tyvi: "metsä", tolge: "mets", teema: '🌍 Keskkond', raske: false, vormid: { inessiiv: "metsässä", elatiiv: "metsästä", illatiiv: "metsään", partitiiv: "metsää", genitiiv: "metsän", abessiiv: "metsättä" } },
            { id: 26, tyvi: "lentokenttä", tolge: "lennujaam", teema: '✈️ Reisimine', raske: false, vormid: { inessiiv: "lentokentässä", elatiiv: "lentokentästä", illatiiv: "lentokenttään", partitiiv: "lentokenttää", genitiiv: "lentokentän" } },
            { id: 27, tyvi: "yliopisto", tolge: "ülikool", teema: '📚 Haridus', raske: false, vormid: { inessiiv: "yliopistossa", elatiiv: "yliopistosta", illatiiv: "yliopistoon", partitiiv: "yliopistoa", genitiiv: "yliopiston" } },
            { id: 28, tyvi: "konsertti", tolge: "kontsert", teema: '🎭 Kultuur', raske: false, vormid: { inessiiv: "konsertissa", elatiiv: "konsertista", illatiiv: "konserttiin", partitiiv: "konserttia", genitiiv: "konsertin" } },
            { id: 29, tyvi: "ystävä", tolge: "sõber", teema: '🤝 Suhted', raske: false, vormid: { inessiiv: "ystävässä", elatiiv: "ystävästä", illatiiv: "ystävään", partitiiv: "ystävää", genitiiv: "ystävän", abessiiv: "ystävättä", komitatiiv: "ystävineni" } }
        ];

        // PRO lausemallid (sisaldab kõiki 12 käänet)
        const laused = [
            // Põhikäänded
            { mall: "Asun {0}.", kaane: "inessiiv", reegel: "Asukoht millegi sees. -ssa/-ssä", tase: "A2" },
            { mall: "Tulen {0}.", kaane: "elatiiv", reegel: "Välja kuskilt. -sta/-stä", tase: "A2" },
            { mall: "Menen {0}.", kaane: "illatiiv", reegel: "Sisse kuhugi. -Vn/-seen", tase: "A2" },
            { mall: "Rakastan {0}.", kaane: "partitiiv", reegel: "Armastan + partitiiv", tase: "A2" },
            { mall: "{0} katto on punainen.", kaane: "genitiiv", reegel: "Omastav. -n", tase: "A2" },
            
            // B1 laused
            { mall: "Kun asuin {0}, tapasin paljon ystäviä.", kaane: "inessiiv", reegel: "Minevik + inessiiv", tase: "B1" },
            { mall: "Olen kotoisin {0}.", kaane: "elatiiv", reegel: "Päritolu", tase: "B1" },
            { mall: "Muutin {0} viime vuonna.", kaane: "illatiiv", reegel: "Kolimine", tase: "B1" },
            { mall: "En näe {0} missään.", kaane: "partitiiv", reegel: "Eitus + partitiiv", tase: "B1" },
            
            // B2 PRO laused (Uued käänded!)
            { mall: "Selviän {0}.", kaane: "abessiiv", reegel: "Ilma milletagi. -tta/ttä", tase: "B2" },
            { mall: "Hän lähti {0}.", kaane: "abessiiv", reegel: "Ilma + abessiiv", tase: "B2" },
            { mall: "Hän saapui {0}.", kaane: "komitatiiv", reegel: "Koos kellegagi. -ne- + possessiivsufiks", tase: "B2" },
            { mall: "Menin sinne {0}.", kaane: "instruktiiv", reegel: "Viis, vahend. -n (tavaliselt mitmuses -in)", tase: "B2" },
            { mall: "Tehtyäni {0} lähden kotiin.", kaane: "genitiiv", reegel: "Lauselühend (tehtyäni + genitiiv)", tase: "B2" },
            { mall: "En ollut koskaan kuullut {0}.", kaane: "elatiiv", reegel: "Kuulda millestki", tase: "B2" }
        ];
        
        const faktid = [
            "PRO versioon sisaldab 12 käänet, sealhulgas haruldased abessiiv, komitatiiv ja instruktiiv.",
            "B2-tasemel oskad sa arutleda abstraktsetel teemadel.",
            "Abessiiv tähendab 'ilma': talotta = ilma majata.",
            "Komitatiivi kasutatakse harva: 'vaimoineen' = koos oma naisega."
        ];
        
        // Kõik 12 käänet nimedega
        const kaandeNimed = {
            'inessiiv': 'inessiiv (-ssa/-ssä)', 'elatiiv': 'elatiiv (-sta/-stä)', 'illatiiv': 'illatiiv (-Vn/-seen)',
            'adessiiv': 'adessiiv (-lla/-llä)', 'ablatiiv': 'ablatiiv (-lta/-ltä)', 'allatiiv': 'allatiiv (-lle)',
            'partitiiv': 'partitiiv (-a/-ä/-ta/-tä)', 'genitiiv': 'genitiiv (-n)',
            'abessiiv': 'abessiiv (-tta/-ttä)', 'komitatiiv': 'komitatiiv (-ne-)', 'instruktiiv': 'instruktiiv (-n/-in)'
        };
        
        // ... (ülejäänud JavaScripti loogika on sama, mis eelmises versioonis, aga kasutab uuendatud andmeid) ...
        // MÄRKUS: Ruumi kokkuhoiuks ei ole siin kogu 400+ rida JS-i uuesti välja toodud.
        // AGA: Asenda oma failis kogu <script> osa selle kommentaari järel olevaga.
        
        // ===== KOPEERI KOGU JÄRGNEV JS OSA OMA FAILI (ALATES 'let hetkelLause = null;') =====
        let hetkelLause = null, hetkelSona = null, hetkelKaane = null, hetkelOigeVastus = "", katsed = 0, seeria = 0, oigeidJarjest = 0, harjutaRaskeidAinult = false, aktiivneTase = "B1";
        
        const maskottEl = document.getElementById('maskott'), seeriaNrEl = document.getElementById('seeria-nr'), mustikadEl = document.querySelectorAll('.mustikas'), lauseKuvaEl = document.getElementById('lause-kuva'), vihjeSonaEl = document.getElementById('vihje-sona'), kaandeInfoEl = document.getElementById('kaande-info'), teemaBadgeEl = document.getElementById('teema-badge'), vastusInput = document.getElementById('vastus-input'), kontrolliNupp = document.getElementById('kontrolli-nupp'), jargmineNupp = document.getElementById('jargmine-nupp'), tagasisideKast = document.getElementById('tagasiside-kast'), tagasisideIkoon = document.getElementById('tagasiside-ikoon'), tagasisideTekst = document.getElementById('tagasiside-tekst'), katseteLuger = document.getElementById('katsete-luger'), reegeliNupp = document.getElementById('reegeli-nupp'), lipuNupp = document.getElementById('lipu-nupp'), raskeidNupp = document.getElementById('raskeid-nupp'), uusLauseNupp = document.getElementById('uus-lause-nupp'), eksportNupp = document.getElementById('eksport-nupp'), importNupp = document.getElementById('import-nupp'), importFail = document.getElementById('import-fail'), faktiTekst = document.getElementById('fakti-tekst'), taseNupud = document.querySelectorAll('.tase-nupp');
        
        function uuendaMustikaid() { const t = Math.min(Math.floor(oigeidJarjest/2), 5); mustikadEl.forEach((e,i)=> e.classList.toggle('taidetud', i<t)); }
        function uuendaSeeria() { seeriaNrEl.textContent = seeria; }
        function resetKatsed() { katsed = 0; katseteLuger.textContent = ''; reegeliNupp.classList.add('hidden'); }
        function muudaMaskotiEmotsioon(e) { maskottEl.className = 'maskott ' + (e==='roomus'?'roomus':(e==='kurb'?'kurb':'')); setTimeout(()=> maskottEl.className = 'maskott', 600); }
        
        function valiJuhuslikLause() {
            let saadavalSonad = harjutaRaskeidAinult ? sonad.filter(s=>s.raske) : [...sonad];
            let saadavalLaused = laused.filter(l=> (aktiivneTase==="A2"?l.tase==="A2":(aktiivneTase==="B1"?l.tase!=="B2":true)));
            if(!saadavalSonad.length) { harjutaRaskeidAinult = false; raskeidNupp.textContent='🎯 Raskeid'; saadavalSonad = sonad; }
            hetkelLause = saadavalLaused[Math.floor(Math.random()*saadavalLaused.length)];
            hetkelSona = saadavalSonad[Math.floor(Math.random()*saadavalSonad.length)];
            hetkelKaane = hetkelLause.kaane;
            if(!hetkelSona.vormid[hetkelKaane]) return valiJuhuslikLause();
            hetkelOigeVastus = hetkelSona.vormid[hetkelKaane];
            lauseKuvaEl.innerHTML = hetkelLause.mall.replace('{0}', '_____');
            vihjeSonaEl.textContent = `${hetkelSona.tolge} (${hetkelSona.tyvi})`;
            kaandeInfoEl.textContent = kaandeNimed[hetkelKaane] || hetkelKaane;
            teemaBadgeEl.textContent = hetkelSona.teema || '📚 Üldine';
            lipuNupp.style.opacity = hetkelSona.raske ? '1' : '0.5';
        }
        
        function uusLause() { valiJuhuslikLause(); vastusInput.value = ''; vastusInput.disabled = false; vastusInput.focus(); kontrolliNupp.style.display='block'; jargmineNupp.style.display='none'; tagasisideKast.className='tagasiside info'; tagasisideIkoon.textContent='📝'; tagasisideTekst.textContent='Kirjuta õige käändevorm.'; resetKatsed(); }
        
        function kontrolliVastust() {
            let v = vastusInput.value.trim().toLowerCase().replace(/[.,!?]+$/, '');
            if (v === hetkelOigeVastus.toLowerCase()) {
                seeria++; oigeidJarjest++; uuendaSeeria(); uuendaMustikaid(); muudaMaskotiEmotsioon('roomus');
                tagasisideKast.className='tagasiside oige'; tagasisideIkoon.textContent='✅';
                tagasisideTekst.textContent = `Oikein! ${hetkelOigeVastus} on täysin oikein.`;
                vastusInput.disabled = true; kontrolliNupp.style.display='none'; jargmineNupp.style.display='block';
                reegeliNupp.classList.add('hidden'); katseteLuger.textContent = '';
            } else {
                katsed++; muudaMaskotiEmotsioon('kurb');
                tagasisideKast.className='tagasiside vale'; tagasisideIkoon.textContent='❌';
                if (katsed >= 3) {
                    tagasisideTekst.textContent = `Valitettavasti väärin. Oikea vastaus: ${hetkelOigeVastus}`;
                    vastusInput.disabled = true; kontrolliNupp.style.display='none'; jargmineNupp.style.display='block';
                    seeria = 0; oigeidJarjest = 0; uuendaSeeria(); uuendaMustikaid();
                } else {
                    tagasisideTekst.textContent = `Väärin. Yritä uudelleen!`; katseteLuger.textContent = `${katsed}/3 yritystä`;
                    reegeliNupp.classList.remove('hidden'); vastusInput.value = ''; vastusInput.focus();
                }
            }
            salvestaEdusammud();
        }
        
        function naitaReeglit() { if(hetkelLause) { tagasisideTekst.textContent = `📖 ${hetkelLause.reegel}`; tagasisideKast.className='tagasiside info'; tagasisideIkoon.textContent='📘'; } }
        function vahetaLipuStaatus() { if(hetkelSona) { hetkelSona.raske = !hetkelSona.raske; lipuNupp.style.opacity = hetkelSona.raske?'1':'0.5'; salvestaEdusammud(); } }
        function vahetaHarjutaRaskeid() { harjutaRaskeidAinult = !harjutaRaskeidAinult; raskeidNupp.textContent = harjutaRaskeidAinult?'🎯 Kaikki':'🎯 Raskeid'; uusLause(); }
        function salvestaEdusammud() { localStorage.setItem('soomeTreenerPRO', JSON.stringify({sonad: sonad.map(s=>({id:s.id, raske:s.raske})), seeria, oigeidJarjest, tase: aktiivneTase})); }
        function laadiEdusammud() { const d = JSON.parse(localStorage.getItem('soomeTreenerPRO')||'{}'); if(d.sonad) d.sonad.forEach(s=>{ const f=sonad.find(x=>x.id===s.id); if(f)f.raske=s.raske; }); seeria=d.seeria||0; oigeidJarjest=d.oigeidJarjest||0; if(d.tase) aktiivneTase=d.tase; uuendaTaseNupud(); uuendaSeeria(); uuendaMustikaid(); }
        function uuendaTaseNupud() { taseNupud.forEach(n=> n.classList.toggle('aktiivne', n.dataset.tase===aktiivneTase)); }
        function ekspordiEdusammud() { const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify({sonad:sonad.map(s=>({id:s.id,tyvi:s.tyvi,raske:s.raske})),seeria,oigeidJarjest,tase:aktiivneTase})],{type:'application/json'})); a.download='soome_pro_edusammud.json'; a.click(); }
        function impordiEdusammud(e) { const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=e=>{ try{ const d=JSON.parse(e.target.result); d.sonad.forEach(s=>{ const x=sonad.find(y=>y.id===s.id); if(x)x.raske=s.raske; }); seeria=d.seeria||0; oigeidJarjest=d.oigeidJarjest||0; if(d.tase) aktiivneTase=d.tase; uuendaTaseNupud(); uuendaSeeria(); uuendaMustikaid(); salvestaEdusammud(); uusLause(); }catch(e){alert('Vigane fail');} }; r.readAsText(f); importFail.value=''; }
        
        kontrolliNupp.addEventListener('click', kontrolliVastust);
        jargmineNupp.addEventListener('click', ()=> { uusLause(); salvestaEdusammud(); });
        uusLauseNupp.addEventListener('click', uusLause);
        reegeliNupp.addEventListener('click', naitaReeglit);
        lipuNupp.addEventListener('click', vahetaLipuStaatus);
        raskeidNupp.addEventListener('click', vahetaHarjutaRaskeid);
        eksportNupp.addEventListener('click', ekspordiEdusammud);
        importNupp.addEventListener('click', ()=> importFail.click());
        importFail.addEventListener('change', impordiEdusammud);
        vastusInput.addEventListener('keypress', e=> { if(e.key==='Enter' && !vastusInput.disabled) kontrolliVastust(); });
        taseNupud.forEach(n=> n.addEventListener('click', ()=> { aktiivneTase=n.dataset.tase; uuendaTaseNupud(); uusLause(); salvestaEdusammud(); }));
        
        laadiEdusammud();
        faktiTekst.textContent = faktid[Math.floor(Math.random()*faktid.length)];
        valiJuhuslikLause();
        setInterval(salvestaEdusammud, 5000);
    });
</script>
