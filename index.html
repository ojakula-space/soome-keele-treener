            { id: 23, tyvi: "työhaastattelu", tolge: "tööintervjuu", teema: '💼 Töö', raske: false, vormid: { inessiiv: "työhaastattelussa", elatiiv: "työhaastattelusta", illatiiv: "työhaastatteluun", partitiiv: "työhaastattelua", genitiiv: "työhaastattelun" } },
            { id: 24, tyvi: "ansioluettelo", tolge: "CV", teema: '💼 Töö', raske: false, vormid: { inessiiv: "ansioluettelossa", elatiiv: "ansioluettelosta", illatiiv: "ansioluetteloon", partitiiv: "ansioluetteloa", genitiiv: "ansioluettelon" } },
            
            // MUUD TEEMAD
            { id: 37, tyvi: "metsä", tolge: "mets", teema: '🌍 Keskkond', raske: false, vormid: { inessiiv: "metsässä", elatiiv: "metsästä", illatiiv: "metsään", partitiiv: "metsää", genitiiv: "metsän", abessiiv: "metsättä" } },
            { id: 38, tyvi: "järvi", tolge: "järv", teema: '🌍 Keskkond', raske: false, vormid: { inessiiv: "järvessä", elatiiv: "järvestä", illatiiv: "järveen", partitiiv: "järveä", genitiiv: "järven" } },
            { id: 39, tyvi: "ilmasto", tolge: "kliima", teema: '🌍 Keskkond', raske: false, vormid: { inessiiv: "ilmastossa", elatiiv: "ilmastosta", illatiiv: "ilmastoon", partitiiv: "ilmastoa", genitiiv: "ilmaston" } },
            { id: 40, tyvi: "luonto", tolge: "loodus", teema: '🌍 Keskkond', raske: false, vormid: { inessiiv: "luonnossa", elatiiv: "luonnosta", illatiiv: "luontoon", partitiiv: "luontoa", genitiiv: "luonnon" } },
            { id: 41, tyvi: "lentokenttä", tolge: "lennujaam", teema: '✈️ Reisimine', raske: false, vormid: { inessiiv: "lentokentässä", elatiiv: "lentokentästä", illatiiv: "lentokenttään", partitiiv: "lentokenttää", genitiiv: "lentokentän" } },
            { id: 42, tyvi: "hotelli", tolge: "hotell", teema: '✈️ Reisimine', raske: false, vormid: { inessiiv: "hotellissa", elatiiv: "hotellista", illatiiv: "hotelliin", partitiiv: "hotellia", genitiiv: "hotellin" } },
            { id: 45, tyvi: "yliopisto", tolge: "ülikool", teema: '📚 Haridus', raske: false, vormid: { inessiiv: "yliopistossa", elatiiv: "yliopistosta", illatiiv: "yliopistoon", partitiiv: "yliopistoa", genitiiv: "yliopiston" } },
            { id: 53, tyvi: "ystävä", tolge: "sõber", teema: '🤝 Suhted', raske: false, vormid: { inessiiv: "ystävässä", elatiiv: "ystävästä", illatiiv: "ystävään", partitiiv: "ystävää", genitiiv: "ystävän", abessiiv: "ystävättä", komitatiiv: "ystävineni" } },
        ];
        
        // LOOMULIKUD LAUSEMALLID
        const laused = [
            { mall: "Asun tällä hetkellä {0}.", kaane: "inessiiv", reegel: "Asukoht millegi sees. -ssa/-ssä", tase: "A2" },
            { mall: "Olen koko päivän {0}.", kaane: "inessiiv", reegel: "Olen terve päeva kuskil.", tase: "A2" },
            { mall: "Tulen juuri {0}.", kaane: "elatiiv", reegel: "Tulen just kuskilt.", tase: "A2" },
            { mall: "Mistä {0} olet kotoisin?", kaane: "elatiiv", reegel: "Kust sa pärit oled?", tase: "A2" },
            { mall: "Menen huomenna {0}.", kaane: "illatiiv", reegel: "Lähen homme kuhugi.", tase: "A2" },
            { mall: "Rakastan {0}.", kaane: "partitiiv", reegel: "Armastan midagi.", tase: "A2" },
            { mall: "Tämä on {0} paras puoli.", kaane: "genitiiv", reegel: "See on millegi parim külg.", tase: "B1" },
            { mall: "Hän lähti {0} aikaisin aamulla.", kaane: "elatiiv", reegel: "Ta lahkus kuskilt varahommikul.", tase: "B1" },
            { mall: "Olen rakastunut {0}.", kaane: "illatiiv", reegel: "Olen armunud millessegi.", tase: "B1" },
            { mall: "En näe {0} missään.", kaane: "partitiiv", reegel: "Ei näe midagi kuskil.", tase: "B1" },
            { mall: "Selviän kyllä {0}.", kaane: "abessiiv", reegel: "Saan hakkama ilma milletagi.", tase: "B2" },
            { mall: "Hän saapui {0}.", kaane: "komitatiiv", reegel: "Ta saabus koos kellegagi.", tase: "B2" },
            { mall: "Menin sinne {0}.", kaane: "instruktiiv", reegel: "Läksin sinna mingil viisil.", tase: "B2" },
            { mall: "{0} vuoksi myöhästyin.", kaane: "genitiiv", reegel: "Millegi tõttu jäin hiljaks.", tase: "B2" },
        ];
        
        const faktid = [
            "PRO versioon sisaldab 12 käänet ja üle 60 sõna!",
            "B2-tasemel oskad sa arutleda abstraktsetel teemadel.",
            "Abessiiv tähendab 'ilma': talotta = ilma majata.",
            "Komitatiivi kasutatakse harva: 'vaimoineen' = koos oma naisega."
        ];
        
        const kaandeNimed = {
            'inessiiv': 'inessiiv (-ssa/-ssä)', 'elatiiv': 'elatiiv (-sta/-stä)', 'illatiiv': 'illatiiv (-Vn/-seen)',
            'partitiiv': 'partitiiv (-a/-ä/-ta/-tä)', 'genitiiv': 'genitiiv (-n)',
            'abessiiv': 'abessiiv (-tta/-ttä)', 'komitatiiv': 'komitatiiv (-ne-)', 'instruktiiv': 'instruktiiv (-n/-in)'
        };
        
        // ===== RAKENDUSE SEISUND =====
        let hetkelLause = null, hetkelSona = null, hetkelKaane = null, hetkelOigeVastus = "";
        let katsed = 0, seeria = 0, oigeidJarjest = 0, harjutaRaskeidAinult = false;
        let aktiivneReziim = "harjuta", aktiivneTase = "B1";
        let maratoniRekord = localStorage.getItem('maratonRekord') ? parseInt(localStorage.getItem('maratonRekord')) : 0;
        let testKysimused = [], testIndeks = 0, testOiged = 0, testValedSonad = [];
        let hiljutisedSonad = [];
        const MAX_HILJUTISI = 15;
        
        // DOM elemendid
        const maskottEl = document.getElementById('maskott'), seeriaNrEl = document.getElementById('seeria-nr');
        const mustikadEl = document.querySelectorAll('.mustikas'), lauseKuvaEl = document.getElementById('lause-kuva');
        const vihjeSonaEl = document.getElementById('vihje-sona'), kaandeInfoEl = document.getElementById('kaande-info');
        const teemaBadgeEl = document.getElementById('teema-badge'), vastusInput = document.getElementById('vastus-input');
        const kontrolliNupp = document.getElementById('kontrolli-nupp'), jargmineNupp = document.getElementById('jargmine-nupp');
        const tagasisideKast = document.getElementById('tagasiside-kast'), tagasisideIkoon = document.getElementById('tagasiside-ikoon');
        const tagasisideTekst = document.getElementById('tagasiside-tekst'), katseteLuger = document.getElementById('katsete-luger');
        const reegeliNupp = document.getElementById('reegeli-nupp'), lipuNupp = document.getElementById('lipu-nupp');
        const raskeidNupp = document.getElementById('raskeid-nupp'), uusLauseNupp = document.getElementById('uus-lause-nupp');
        const eksportNupp = document.getElementById('eksport-nupp'), importNupp = document.getElementById('import-nupp');
        const importFail = document.getElementById('import-fail'), faktiTekst = document.getElementById('fakti-tekst');
        const reziimNupud = document.querySelectorAll('.reziim-nupp'), taseNupud = document.querySelectorAll('.tase-nupp');
        const testModal = document.getElementById('test-modal'), testSisu = document.getElementById('test-sisu');
        const testClose = document.getElementById('test-close');
        
        // ===== FUNKTSIOONID =====
        function uuendaMustikaid() { const t = Math.min(Math.floor(oigeidJarjest/2), 5); mustikadEl.forEach((e,i)=> e.classList.toggle('taidetud', i<t)); }
        function uuendaSeeria() { seeriaNrEl.textContent = seeria; }
        function resetKatsed() { katsed = 0; katseteLuger.textContent = ''; reegeliNupp.classList.add('hidden'); }
        function muudaMaskotiEmotsioon(e) { maskottEl.className = 'maskott ' + (e==='roomus'?'roomus':(e==='kurb'?'kurb':'')); setTimeout(()=> maskottEl.className = 'maskott', 600); }
        function uuendaTaseNupud() { taseNupud.forEach(n => n.classList.toggle('aktiivne-tase', n.dataset.tase === aktiivneTase)); }
        
        function filtreeriLausedTasemeJargi(tase) {
            return laused.filter(l => {
                if (tase === "A2") return l.tase === "A2";
                if (tase === "B1") return l.tase === "A2" || l.tase === "B1";
                return true;
            });
        }
        
        function valiJuhuslikSona(saadavalSonad) {
            let sona = null, katseid = 0;
            do { sona = saadavalSonad[Math.floor(Math.random() * saadavalSonad.length)]; katseid++; } 
            while (hiljutisedSonad.includes(sona.id) && katseid < 50);
            hiljutisedSonad.push(sona.id);
            if (hiljutisedSonad.length > MAX_HILJUTISI) hiljutisedSonad.shift();
            return sona;
        }
        
        function valiJuhuslikLause() {
            let saadavalSonad = harjutaRaskeidAinult ? sonad.filter(s=>s.raske) : [...sonad];
            let saadavalLaused = filtreeriLausedTasemeJargi(aktiivneTase);
            if(!saadavalSonad.length) { harjutaRaskeidAinult = false; raskeidNupp.textContent='🎯 Raskeid'; saadavalSonad = sonad; }
            hetkelLause = saadavalLaused[Math.floor(Math.random()*saadavalLaused.length)];
            hetkelSona = valiJuhuslikSona(saadavalSonad);
            hetkelKaane = hetkelLause.kaane;
            if(!hetkelSona.vormid[hetkelKaane]) return valiJuhuslikLause();
            hetkelOigeVastus = hetkelSona.vormid[hetkelKaane];
            lauseKuvaEl.innerHTML = hetkelLause.mall.replace('{0}', '_____');
            vihjeSonaEl.textContent = `${hetkelSona.tolge} (${hetkelSona.tyvi})`;
            kaandeInfoEl.textContent = kaandeNimed[hetkelKaane] || hetkelKaane;
            teemaBadgeEl.textContent = hetkelSona.teema || '📚 Üldine';
            lipuNupp.style.opacity = hetkelSona.raske ? '1' : '0.5';
        }
        
        function uusLause() {
            valiJuhuslikLause();
            vastusInput.value = ''; vastusInput.disabled = false; vastusInput.focus();
            kontrolliNupp.style.display='block'; jargmineNupp.style.display='none';
            tagasisideKast.className='tagasiside info'; tagasisideIkoon.textContent='📝';
            tagasisideTekst.textContent = aktiivneReziim === 'maraton' ? `🔥 MARATON (${aktiivneTase}): ${seeria} õiget!` : `Kirjuta õige käändevorm (${aktiivneTase}).`;
            resetKatsed();
        }
        
        function kontrolliVastust() {
            let v = vastusInput.value.trim().toLowerCase().replace(/[.,!?]+$/, '');
            const onOige = v === hetkelOigeVastus.toLowerCase();
            if (onOige) {
                seeria++; oigeidJarjest++; uuendaSeeria(); uuendaMustikaid(); muudaMaskotiEmotsioon('roomus');
                tagasisideKast.className='tagasiside oige'; tagasisideIkoon.textContent='✅';
                if (aktiivneReziim === 'maraton') { tagasisideTekst.textContent = `🔥 Oikein! Seeria: ${seeria}`; uusLause(); }
                else { tagasisideTekst.textContent = `Oikein! ${hetkelOigeVastus}`; vastusInput.disabled = true; kontrolliNupp.style.display='none'; jargmineNupp.style.display='block'; }
                reegeliNupp.classList.add('hidden'); katseteLuger.textContent = '';
            } else {
                katsed++; muudaMaskotiEmotsioon('kurb'); tagasisideKast.className='tagasiside vale'; tagasisideIkoon.textContent='❌';
                if (aktiivneReziim === 'maraton') {
                    tagasisideTekst.textContent = `💔 Maraton läbi! Seeria: ${seeria}. Õige: ${hetkelOigeVastus}`;
                    if (seeria > maratoniRekord) { maratoniRekord = seeria; localStorage.setItem('maratonRekord', maratoniRekord); tagasisideTekst.textContent += ` 🏆 UUS REKORD!`; }
                    vastusInput.disabled = true; kontrolliNupp.style.display='none'; jargmineNupp.style.display='block';
                    seeria = 0; oigeidJarjest = 0; uuendaSeeria(); uuendaMustikaid();
                } else {
                    if (katsed >= 3) { tagasisideTekst.textContent = `Väärin. Oikea: ${hetkelOigeVastus}`; vastusInput.disabled = true; kontrolliNupp.style.display='none'; jargmineNupp.style.display='block'; if(aktiivneReziim!=='test') { seeria=0; oigeidJarjest=0; uuendaSeeria(); uuendaMustikaid(); } }
                    else { tagasisideTekst.textContent = `Väärin. Yritä uudelleen!`; katseteLuger.textContent = `${katsed}/3 yritystä`; reegeliNupp.classList.remove('hidden'); vastusInput.value = ''; vastusInput.focus(); }
                }
            }
            salvestaEdusammud();
        }
        
        function naitaReeglit() { if(hetkelLause) { tagasisideTekst.textContent = `📖 ${hetkelLause.reegel}`; tagasisideKast.className='tagasiside info'; tagasisideIkoon.textContent='📘'; } }
        function vahetaLipuStaatus() { if(hetkelSona) { hetkelSona.raske = !hetkelSona.raske; lipuNupp.style.opacity = hetkelSona.raske?'1':'0.5'; salvestaEdusammud(); } }
        function vahetaHarjutaRaskeid() { harjutaRaskeidAinult = !harjutaRaskeidAinult; raskeidNupp.textContent = harjutaRaskeidAinult?'🎯 Kaikki':'🎯 Raskeid'; uusLause(); }
        function salvestaEdusammud() { localStorage.setItem('soomeTreenerPRO', JSON.stringify({sonad: sonad.map(s=>({id:s.id, raske:s.raske})), seeria, oigeidJarjest, tase: aktiivneTase})); }
        function laadiEdusammud() { const d = JSON.parse(localStorage.getItem('soomeTreenerPRO')||'{}'); if(d.sonad) d.sonad.forEach(s=>{ const f=sonad.find(x=>x.id===s.id); if(f)f.raske=s.raske; }); seeria=d.seeria||0; oigeidJarjest=d.oigeidJarjest||0; if(d.tase) { aktiivneTase=d.tase; uuendaTaseNupud(); } uuendaSeeria(); uuendaMustikaid(); }
        function ekspordiEdusammud() { const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify({sonad:sonad.map(s=>({id:s.id,tyvi:s.tyvi,raske:s.raske})),seeria,oigeidJarjest,tase:aktiivneTase})],{type:'application/json'})); a.download='soome_pro_edusammud.json'; a.click(); }
        function impordiEdusammud(e) { const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=e=>{ try{ const d=JSON.parse(e.target.result); d.sonad.forEach(s=>{ const x=sonad.find(y=>y.id===s.id); if(x)x.raske=s.raske; }); seeria=d.seeria||0; oigeidJarjest=d.oigeidJarjest||0; if(d.tase) { aktiivneTase=d.tase; uuendaTaseNupud(); } uuendaSeeria(); uuendaMustikaid(); salvestaEdusammud(); uusLause(); }catch(e){alert('Vigane fail');} }; r.readAsText(f); importFail.value=''; }
        
        function vahetaReziim(reziim) {
            aktiivneReziim = reziim; reziimNupud.forEach(n => n.classList.remove('aktiivne'));
            document.querySelector(`.reziim-nupp[data-reziim="${reziim}"]`).classList.add('aktiivne');
            if (reziim === 'test') { alustaTesti(); } 
            else if (reziim === 'maraton') { seeria = 0; oigeidJarjest = 0; uuendaSeeria(); uuendaMustikaid(); tagasisideTekst.textContent = `🔥 MARATON (${aktiivneTase})! Rekord: ${maratoniRekord}`; uusLause(); } 
            else { uusLause(); }
        }
        
        function alustaTesti() {
            testKysimused = []; testIndeks = 0; testOiged = 0; testValedSonad = [];
            const testiLaused = filtreeriLausedTasemeJargi(aktiivneTase);
            for (let i = 0; i < 15; i++) {
                let sona = sonad[Math.floor(Math.random() * sonad.length)];
                let lause = testiLaused[Math.floor(Math.random() * testiLaused.length)];
                let katseid = 0;
                while (!sona.vormid[lause.kaane] && katseid < 50) { sona = sonad[Math.floor(Math.random() * sonad.length)]; katseid++; }
                testKysimused.push({ sona, lause, vastus: sona.vormid[lause.kaane] });
            }
            naitaTestiKysimust(); testModal.style.display = 'flex';
        }
        
        function naitaTestiKysimust() {
            if (testIndeks >= testKysimused.length) return lopetaTest();
            const k = testKysimused[testIndeks];
            testSisu.innerHTML = `
                <div class="test-progress">Küsimus ${testIndeks + 1} / 15 (Tase: ${aktiivneTase})</div>
                <div class="test-kysimus">${k.lause.mall.replace('{0}', '_____')}</div>
                <div class="vihje">(${k.sona.tolge} - ${k.sona.tyvi}) [${kaandeNimed[k.lause.kaane]}]</div>
                <div class="input-group" style="margin-top:20px"><input type="text" class="vastus-input" id="test-vastus" placeholder="Vastus..." autofocus><button class="btn" id="test-vasta">Vasta</button></div>
                <div id="test-tagasiside" class="tagasiside info" style="margin-top:15px"></div>
            `;
            document.getElementById('test-vasta').addEventListener('click', () => {
                const vastus = document.getElementById('test-vastus').value.trim().toLowerCase();
                const oige = testKysimused[testIndeks].vastus, tagasiside = document.getElementById('test-tagasiside');
                if (vastus === oige) { testOiged++; tagasiside.className = 'tagasiside oige'; tagasiside.textContent = `✅ Õige! ${oige}`; } 
                else { testValedSonad.push(testKysimused[testIndeks].sona.id); tagasiside.className = 'tagasiside vale'; tagasiside.textContent = `❌ Vale! Õige: ${oige}`; }
                testIndeks++; setTimeout(() => naitaTestiKysimust(), 700);
            });
            document.getElementById('test-vastus').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('test-vasta').click(); });
        }
        
        function lopetaTest() {
            testModal.style.display = 'none'; const protsent = Math.round((testOiged / 15) * 100);
            let soovitatavTase = protsent >= 80 ? 'B2' : (protsent >= 60 ? 'B1' : 'A2');
            testValedSonad.forEach(id => { const sona = sonad.find(s => s.id === id); if (sona) sona.raske = true; });
            salvestaEdusammud();
            alert(`TEST LÄBI!\n\nTulemus: ${testOiged}/15 (${protsent}%)\nTesti tase: ${aktiivneTase}\nSoovitatav tase: ${soovitatavTase}\n\n${testValedSonad.length} sõna märgitud raskeks.`);
            aktiivneReziim = 'harjuta'; reziimNupud.forEach(n => n.classList.remove('aktiivne'));
            document.querySelector(`.reziim-nupp[data-reziim="harjuta"]`).classList.add('aktiivne'); uusLause();
        }
        
        // Sündmused
        kontrolliNupp.addEventListener('click', kontrolliVastust);
        jargmineNupp.addEventListener('click', uusLause);
        uusLauseNupp.addEventListener('click', uusLause);
        reegeliNupp.addEventListener('click', naitaReeglit);
        lipuNupp.addEventListener('click', vahetaLipuStaatus);
        raskeidNupp.addEventListener('click', vahetaHarjutaRaskeid);
        eksportNupp.addEventListener('click', ekspordiEdusammud);
        importNupp.addEventListener('click', ()=> importFail.click());
        importFail.addEventListener('change', impordiEdusammud);
        vastusInput.addEventListener('keypress', e=> { if(e.key==='Enter' && !vastusInput.disabled) kontrolliVastust(); });
        reziimNupud.forEach(n => n.addEventListener('click', () => vahetaReziim(n.dataset.reziim)));
        taseNupud.forEach(n => n.addEventListener('click', () => { aktiivneTase = n.dataset.tase; uuendaTaseNupud(); uusLause(); salvestaEdusammud(); }));
        testClose.addEventListener('click', () => { testModal.style.display = 'none'; aktiivneReziim = 'harjuta'; reziimNupud.forEach(n => n.classList.remove('aktiivne')); document.querySelector(`.reziim-nupp[data-reziim="harjuta"]`).classList.add('aktiivne'); });
        maskottEl.addEventListener('click', () => { muudaMaskotiEmotsioon('roomus'); tagasisideTekst.textContent = '🦊 Tsemppiä harjoitteluun!'; });
        
        // Käivita
        laadiEdusammud(); uuendaTaseNupud();
        faktiTekst.textContent = faktid[Math.floor(Math.random()*faktid.length)];
        valiJuhuslikLause();
        setInterval(salvestaEdusammud, 5000);
    });
</script>

</body>
